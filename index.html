
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Melbourne Free Parking Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>

<body>

<div id="map"></div>
  
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
const map = L.map('map').setView([-37.8136, 144.9631], 13);

L.tileLayer(
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

function getMarkerColour(row) {
  return row.marker_colour || "black";
}

fetch("parking-zones-map-data-simple.csv")
  .then(response => response.text())
  .then(csvText => {
    const parsed = Papa.parse(csvText, {
      header: true,
      skipEmptyLines: true
    });

    parsed.data.forEach(row => {
      const lat = parseFloat(row.latitude);
      const lng = parseFloat(row.longitude);

      if (isNaN(lat) || isNaN(lng)) return;

      L.circleMarker([lat, lng], {
        radius: 4,
        color: row.marker_colour || "black",
        fillColor: row.marker_colour || "black",
        fillOpacity: 0.8
      })
      .addTo(map)
      .bindPopup(
        "<strong>" + row.duration + "</strong><br>" +
        row.restriction_summary
      );
    });
  });
</script>
</body>
</html>
