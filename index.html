
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Melbourne Free Parking Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>

<body>

<div id="map"></div>
  
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
const map = L.map('map').setView([-37.8136, 144.9631], 13);


L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap & CARTO'
  }
).addTo(map);

function getMarkerColour(row) {
  return row.marker_colour || "black";
}

fetch("parking-zones-map-data-simple.csv")
  .then(response => response.text())
  .then(csvText => {
    const parsed = Papa.parse(csvText, {
      header: true,
      skipEmptyLines: true
    });
    
      const zones = {};
      
      // Group records by parking zone
      parsed.data.forEach(row => {
      
          const zone = row.parking_zone;
      
          if (!zone) return;
      
          const lat = parseFloat(row.latitude);
          const lng = parseFloat(row.longitude);
      
          if (isNaN(lat) || isNaN(lng)) return;
      
          if (!zones[zone]) {
              zones[zone] = {
                  points: [],
                  colour: row.marker_colour,
                  duration: row.duration,
                  street: row.on_street,
                  restriction: row.restriction_summary
              };
          }
      
          zones[zone].points.push([lat, lng]);
      });
          
      Object.values(zones).forEach(zone => {
      
          const lats = zone.points.map(p => p[0]);
          const lngs = zone.points.map(p => p[1]);
      
          const minLat = Math.min(...lats);
          const maxLat = Math.max(...lats);
          const minLng = Math.min(...lngs);
          const maxLng = Math.max(...lngs);
      
          const bounds = [
              [minLat, minLng],
              [maxLat, maxLng]
          ];
      
          L.rectangle(bounds, {
              color: zone.colour,
              fillColor: zone.colour,
              fillOpacity: 0.4,
              weight: 1
          })
          .addTo(map)
          .bindPopup(`
              <strong>${zone.duration}</strong><br>
              ${zone.restriction}<br><br>
              ${zone.street}
          `);
      
      });
  });
</script>
</body>
</html>
